name: Build and Push Docker Image to GHCR

on:
  push:
    tags:
      - "*" # Triggers with every tag

# Set permissions so the workflow cann upload images tags
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 1. Log in to GitHub Container Registry (Uses automated secret token)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Buiild and Push the image to ghcr.io
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/zero_food_waste:latest
            ghcr.io/${{ github.repository_owner }}/zero_food_waste:${{ github.ref_name }}